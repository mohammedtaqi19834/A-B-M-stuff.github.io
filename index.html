<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            font-family: sans-serif; 
            background: url('https://raw.githubusercontent.com/mohammedtaqi19834/A-B-M-stuff.github.io/main/798A881F-0810-4083-A767-0D689369CA35.png') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            display: flex; 
        }
        
        /* القائمة الجانبية بتأثير الزجاج */
        .sidebar { width: 250px; height: 100vh; padding: 20px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border-left: 1px solid #00d4ff; }
        .sidebar h2 { color: #00d4ff; text-align: center; }
        .sidebar a { display: block; color: #ffffff; text-decoration: none; margin: 30px 0; font-size: 22px; transition: 0.3s; }
        .sidebar a:hover { color: #00d4ff; }

        /* منطقة المحتوى */
        .content { flex: 1; padding: 50px; background: rgba(0, 0, 0, 0.3); }
        section { min-height: 100vh; }

        /* التذييل */
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.8); padding: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>القائمة</h2>
        <a href="#books">📚 قسم الكتب</a>
        <a href="#games">🎮 قسم الألعاب</a>
        <a href="#contact">📩 اتصل بنا</a>
    </div>

    <div class="content">
        <section id="books">
            <h1>ملفات PDF والكتب</h1>
            <p>هنا ستظهر ملفاتك الجاهزة للشراء.</p>
        </section>
        
        <section id="games">
            <h1>الألعاب والملفات</h1>
            <p>محتوى الألعاب والملفات التقنية.</p>
        </section>
    </div>

    <footer>
        📧 البريد: info@abm-stuff.com | ✈️ تليجرام: @your_handle
    </footer>

</body>
</html>
